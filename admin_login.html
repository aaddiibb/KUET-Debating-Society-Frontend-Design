<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KUET Debating Society | Admin Login</title>
	<link rel="stylesheet" href="login.css">
</head>
<body>
	<main class="login-page">
		<section class="login-card" aria-labelledby="login-title">
			<p class="club-name">KUET Debating Society</p>
			<h1 id="login-title">Admin Login</h1>
			<p class="intro-text">Sign in to manage members, events, and notices.</p>
			<div class="flash-message" hidden data-flash-message></div>

			<form action="admin_login.php" method="post" class="login-form">
				<div class="form-group">
					<label for="username">Username</label>
					<input type="text" id="username" name="username" placeholder="admin" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter your password" required>
				</div>

				<button type="submit" class="login-btn">Login</button>
			</form>

			<p class="helper-text">
				Member login?
				<a href="login.html" class="text-link">Go to member login</a>
			</p>
		</section>
	</main>

	<script>
		(function () {
			const params = new URLSearchParams(window.location.search);
			const message = params.get('error');
			if (!message) return;
			const box = document.querySelector('[data-flash-message]');
			if (!box) return;
			box.textContent = message;
			box.hidden = false;
			box.classList.add('flash-error');
		})();
	</script>
</body>
</html>
