<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KUET Debating Society | Member Login</title>
	<link rel="stylesheet" href="login.css">
</head>
<body>
	<main class="login-page">
		<section class="login-card" aria-labelledby="login-title">
			<p class="club-name">KUET Debating Society</p>
			<h1 id="login-title">Member Login</h1>
			<p class="intro-text">Sign in to access club updates and activities.</p>

			<form action="login.php" method="post" class="login-form">
				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="member@kuet.ac.bd" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter your password" required>
				</div>

				<div class="utility-row">
					<a href="#" class="text-link forgot-link">Forgot password?</a>
				</div>

				<button type="submit" class="login-btn">Login</button>
			</form>

			<p class="helper-text">
				Need an account?
				<a href="signup.html" class="text-link">Go to signup page</a>
			</p>
		</section>
	</main>
	<script src="login.js" defer></script>
</body>
</html>
