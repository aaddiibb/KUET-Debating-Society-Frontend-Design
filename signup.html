<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KUET Debating Society | Member Signup</title>
	<link rel="stylesheet" href="signup.css">
</head>
<body>
	<main class="signup-page">
		<section class="signup-card" aria-labelledby="signup-title">
			<p class="club-name">KUET Debating Society</p>
			<h1 id="signup-title">Member Signup</h1>
			<p class="intro-text">Create your account to join club activities and updates.</p>

			<!-- Clear labels and simple field order for beginner-friendly HTML -->
			<form action="#" method="post" class="signup-form">
				<div class="form-group">
					<label for="full-name">Full Name</label>
					<input type="text" id="full-name" name="fullName" placeholder="Enter your full name" required>
				</div>

				<div class="form-group">
					<label for="student-id">Student ID</label>
					<input type="text" id="student-id" name="studentId" placeholder="Enter your student ID" required>
				</div>

				<div class="form-group">
					<label for="department">Department</label>
					<select id="department" name="department" required>
						<option value="" selected disabled>Select your department</option>
						<option value="cse">CSE</option>
						<option value="eee">EEE</option>
						<option value="me">ME</option>
						<option value="ce">CE</option>
						<option value="other">Other</option>
					</select>
				</div>

				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="member@kuet.ac.bd" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Create a password" required>
				</div>

				<div class="form-group">
					<label for="confirm-password">Confirm Password</label>
					<input type="password" id="confirm-password" name="confirmPassword" placeholder="Re-enter password" required>
				</div>

				<label class="agree-row">
					<input type="checkbox" name="agree" required>
					I agree to the club membership terms.
				</label>

				<button type="submit" class="signup-btn">Create Account</button>
			</form>

			<p class="helper-text">
				Already a member?
				<a href="login.html" class="text-link">Go to login page</a>
			</p>
		</section>
	</main>
	<script src="signup.js" defer></script>
</body>
</html>
